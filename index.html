<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeZen</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<style>
body{background:#0f0f14;color:#fff;font-family:Inter,sans-serif}
.glass{background:rgba(20,20,30,.85);backdrop-filter:blur(20px)}
.card{transition:.3s}
.card:hover{transform:scale(1.05)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);align-items:center;justify-content:center;z-index:1000}
.modal.active{display:flex}
.toast-container{
position:fixed;
top:20px;
right:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:9999;
}
.toast{
background:#1c1c24;
padding:15px 20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
animation:slide .4s ease;
}
@keyframes slide{from{transform:translateX(100%)}to{transform:translateX(0)}}
input,textarea{background:#1c1c24}
.star{cursor:pointer;font-size:20px}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<header class="glass fixed top-0 w-full px-8 py-4 flex justify-between items-center z-50">
<div class="text-2xl font-black text-purple-400">ANIMEZEN</div>
<div class="flex gap-4 items-center">
<button onclick="openNews()">Новости</button>
<button onclick="openProfile()">Профиль</button>
<button onclick="toggleModal('adminModal')" id="adminBtn" class="hidden bg-purple-600 px-4 py-2 rounded-xl text-sm">Админ</button>
<button onclick="toggleModal('authModal')" id="authBtn" class="bg-purple-600 px-4 py-2 rounded-xl text-sm">Войти</button>
<button onclick="logout()" id="logoutBtn" class="hidden bg-red-600 px-4 py-2 rounded-xl text-sm">Выйти</button>
</div>
</header>

<section id="animeSection" class="pt-32 max-w-7xl mx-auto px-8 pb-20">
<div id="animeGrid" class="grid grid-cols-2 md:grid-cols-5 gap-8"></div>
</section>

<section id="newsSection" class="pt-32 max-w-5xl mx-auto px-8 pb-20 hidden">
<h2 class="text-3xl text-purple-400 mb-8 font-bold">Новости</h2>
<div id="newsContainer" class="space-y-6"></div>
</section>

<!-- PLAYER -->
<div id="playerModal" class="modal">
<div class="bg-[#181822] p-6 rounded-3xl w-[900px] max-h-[90vh] overflow-y-auto">
<iframe id="playerFrame" class="w-full h-96 mb-6"></iframe>

<h3 class="text-purple-400 font-bold mb-2">Рейтинг</h3>
<div id="ratingStars" class="mb-4"></div>
<p class="mb-6">Средний рейтинг: <span id="avgRating">0</span></p>

<h3 class="text-purple-400 font-bold mb-2">Комментарии</h3>
<div id="comments" class="space-y-3 mb-4"></div>
<textarea id="commentInput" class="w-full p-3 rounded-xl mb-3" placeholder="Ваш комментарий"></textarea>
<button onclick="addComment()" class="bg-purple-600 px-4 py-2 rounded-xl">Отправить</button>
</div>
</div>

<!-- PROFILE -->
<div id="profileModal" class="modal">
<div class="bg-[#181822] p-8 rounded-3xl w-[400px]">
<h2 class="text-purple-400 text-xl mb-4 font-bold">Профиль</h2>
<img id="avatarPreview" class="w-24 h-24 rounded-full mb-4 object-cover">
<input type="file" id="avatarInput" class="mb-3">
<input id="nicknameInput" class="w-full p-3 mb-3 rounded-xl" placeholder="Никнейм">
<p>ID: <span id="profileId"></span></p>
<p>Просмотрено аниме: <span id="animeCount"></span></p>
<p>Просмотрено новостей: <span id="newsCount"></span></p>
<button onclick="saveProfile()" class="mt-4 w-full bg-purple-600 py-2 rounded-xl">Сохранить</button>
</div>
</div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyAAigsanR80Qe2Du4MmAxIMLBghPqy4nXE",
databaseURL:"https://animezen-97635-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"animezen-97635",
storageBucket:"animezen-97635.appspot.com"
});

const auth=firebase.auth();
const db=firebase.database();
const storage=firebase.storage();
const ADMIN_EMAIL="rdzaurov093@gmail.com";

let currentUser=null;
let currentAnimeId=null;

function toast(text){
const t=document.createElement("div");
t.className="toast";
t.innerText=text;
toastContainer.appendChild(t);
setTimeout(()=>t.remove(),3000);
}

auth.onAuthStateChanged(user=>{
currentUser=user;
if(user){
authBtn.classList.add("hidden");
logoutBtn.classList.remove("hidden");
if(user.email===ADMIN_EMAIL) adminBtn.classList.remove("hidden");
}else{
authBtn.classList.remove("hidden");
logoutBtn.classList.add("hidden");
adminBtn.classList.add("hidden");
}
});

function logout(){auth.signOut();toast("Вы вышли");}

function openProfile(){
if(!currentUser)return toast("Войдите");
toggleModal("profileModal");
db.ref("users/"+currentUser.uid).once("value").then(s=>{
const d=s.val();
nicknameInput.value=d.nickname;
profileId.innerText=d.siteId;
animeCount.innerText=d.animeCount||0;
newsCount.innerText=d.newsCount||0;
if(d.avatar) avatarPreview.src=d.avatar;
});
}

function saveProfile(){
const file=avatarInput.files[0];
if(file){
const ref=storage.ref("avatars/"+currentUser.uid);
ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
db.ref("users/"+currentUser.uid).update({
nickname:nicknameInput.value,
avatar:url
});
avatarPreview.src=url;
toast("Профиль обновлён");
});
});
}else{
db.ref("users/"+currentUser.uid).update({
nickname:nicknameInput.value
});
toast("Профиль обновлён");
}
}

function toggleModal(id){
document.getElementById(id).classList.toggle("active");
}

function openNews(){
animeSection.classList.add("hidden");
newsSection.classList.remove("hidden");
}

function playAnime(id,url){
currentAnimeId=id;
playerFrame.src=url;
toggleModal("playerModal");
loadComments();
loadRating();
}

function addComment(){
if(!currentUser)return toast("Войдите");
db.ref("anime/"+currentAnimeId+"/comments").push({
uid:currentUser.uid,
text:commentInput.value
});
commentInput.value="";
}

function loadComments(){
comments.innerHTML="";
db.ref("anime/"+currentAnimeId+"/comments").on("value",snap=>{
comments.innerHTML="";
snap.forEach(c=>{
comments.innerHTML+=`<div class="bg-[#1c1c24] p-3 rounded-xl">${c.val().text}</div>`;
});
});
}

function loadRating(){
ratingStars.innerHTML="";
for(let i=1;i<=5;i++){
ratingStars.innerHTML+=`<span class="star" onclick="rate(${i})">⭐</span>`;
}
db.ref("anime/"+currentAnimeId+"/rating").once("value").then(s=>{
avgRating.innerText=s.val()||0;
});
}

function rate(value){
if(!currentUser)return toast("Войдите");
db.ref("anime/"+currentAnimeId+"/rates/"+currentUser.uid).set(value).then(()=>{
db.ref("anime/"+currentAnimeId+"/rates").once("value").then(s=>{
let sum=0,count=0;
s.forEach(r=>{sum+=r.val();count++;});
let avg=(sum/count).toFixed(1);
db.ref("anime/"+currentAnimeId+"/rating").set(avg);
avgRating.innerText=avg;
});
});
}

db.ref("anime").on("value",snap=>{
animeGrid.innerHTML="";
snap.forEach(child=>{
const id=child.key;
const a=child.val();
animeGrid.innerHTML+=`
<div class="card bg-[#181822] p-4 rounded-2xl">
<img src="${a.poster}" class="rounded-xl mb-3">
<h3 class="font-bold mb-2">${a.title}</h3>
<p class="mb-2">⭐ ${a.rating||0}</p>
<button onclick="playAnime('${id}','${a.episodes?Object.values(a.episodes)[0].embed:""}')" class="bg-purple-600 px-3 py-1 rounded-xl">Смотреть</button>
</div>`;
});
});
</script>

</body>
</html>
