<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeZen</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body{
background:#000;
color:white;
font-family:Inter,sans-serif;
overflow-x:hidden;
}

/* Glow background */
body::before{
content:"";
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle,#7c3aed22 0%,transparent 60%);
animation:rotateGlow 20s linear infinite;
z-index:-1;
}
@keyframes rotateGlow{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.purple-gradient{
background:linear-gradient(135deg,#a855f7,#7c3aed);
}

.anime-card{
transition:all .4s ease;
}
.anime-card:hover{
transform:scale(1.08);
z-index:10;
}
.anime-card:active{
transform:scale(1.05);
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
backdrop-filter:blur(20px);
align-items:center;
justify-content:center;
}
.modal.active{
display:flex;
}

#playerContainer iframe{
width:100%;
height:100%;
border:none;
border-radius:20px;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="fixed top-0 left-0 w-full z-50 backdrop-blur-xl bg-black/40 border-b border-purple-900/20">
<div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

<div class="text-2xl font-black tracking-wider">
<span class="text-purple-500">ANIME</span>ZEN
</div>

<div class="hidden md:flex w-1/3">
<input id="searchInput" 
type="text" 
placeholder="Поиск аниме..." 
class="w-full px-5 py-2 bg-[#111] rounded-full outline-none focus:ring-2 focus:ring-purple-600 transition">
</div>

<div class="flex items-center gap-3">
<a href="https://t.me/" target="_blank"
class="bg-cyan-500 hover:bg-cyan-400 transition px-5 py-2 rounded-full text-sm font-bold">
ТЕЛЕГРАМ
</a>

<button id="authBtn" onclick="toggleModal('authModal')" 
class="purple-gradient px-5 py-2 rounded-full text-sm font-bold">
ВОЙТИ
</button>

<button id="logoutBtn" onclick="logout()" 
class="hidden bg-red-600 px-4 py-2 rounded-full text-sm">
ВЫЙТИ
</button>
</div>

</div>
</header>

<!-- HERO -->
<section class="pt-40 pb-28 max-w-7xl mx-auto px-6">
<span class="bg-purple-600 text-xs px-4 py-1 rounded-full">
CINEMA EXPERIENCE
</span>

<h1 class="text-6xl md:text-8xl font-black mt-6 bg-gradient-to-r from-white to-purple-500 bg-clip-text text-transparent">
ANIMEZEN
</h1>

<p class="mt-6 text-gray-400 max-w-xl text-lg">
Твоя приватная зона комфорта. Добавляй лучшие тайтлы в облако и смотри их в идеальном качестве.
</p>
</section>

<!-- GRID -->
<section class="max-w-7xl mx-auto px-6 pb-20">
<h2 class="text-3xl font-black mb-10 flex items-center gap-3">
<span class="w-1 h-6 bg-purple-600 rounded"></span>
<span class="bg-gradient-to-r from-white to-purple-500 bg-clip-text text-transparent">
НЕДАВНИЕ ОБНОВЛЕНИЯ
</span>
</h2>

<div id="animeGrid" class="grid grid-cols-2 md:grid-cols-5 gap-8"></div>
</section>

<!-- AUTH MODAL -->
<div id="authModal" class="modal">
<div class="bg-[#111] p-10 rounded-3xl w-96 relative">
<button onclick="toggleModal('authModal')" class="absolute right-6 top-4 text-2xl">×</button>

<input id="email" type="email" placeholder="Email" class="w-full mb-4 p-3 bg-[#222] rounded">
<input id="password" type="password" placeholder="Пароль" class="w-full mb-6 p-3 bg-[#222] rounded">
<button onclick="login()" class="w-full purple-gradient py-3 rounded font-black">Войти</button>

<hr class="my-6 border-gray-700">

<input id="regEmail" type="email" placeholder="Email" class="w-full mb-4 p-3 bg-[#222] rounded">
<input id="regPassword" type="password" placeholder="Пароль (мин 6 символов)" class="w-full mb-6 p-3 bg-[#222] rounded">
<button onclick="register()" class="w-full purple-gradient py-3 rounded font-black">Зарегистрироваться</button>

</div>
</div>

<!-- PLAYER -->
<div id="playerModal" class="modal">
<div class="w-full max-w-5xl aspect-video bg-black rounded-3xl relative">
<button onclick="closePlayer()" class="absolute right-4 top-4 text-2xl z-50">×</button>
<div id="playerContainer" class="w-full h-full"></div>
</div>
</div>

<script>
firebase.initializeApp({
apiKey: "AIzaSyAAigsanR80Qe2Du4MmAxIMLBghPqy4nXE",
databaseURL: "https://animezen-97635-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "animezen-97635"
});

const auth=firebase.auth();
const db=firebase.database();
const ADMIN_EMAIL="rdzaurov093@gmail.com";

auth.onAuthStateChanged(user=>{
if(user){
authBtn.classList.add("hidden");
logoutBtn.classList.remove("hidden");
}else{
authBtn.classList.remove("hidden");
logoutBtn.classList.add("hidden");
}
});

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>toggleModal('authModal'))
.catch(e=>alert(e.message));
}

function register(){
auth.createUserWithEmailAndPassword(regEmail.value,regPassword.value)
.then(()=>toggleModal('authModal'))
.catch(e=>alert(e.message));
}

function logout(){ auth.signOut(); }

db.ref("animeList").on("value",snap=>{
const data=snap.val();
animeGrid.innerHTML="";
if(!data)return;

Object.entries(data).reverse().forEach(([key,item])=>{
animeGrid.innerHTML+=`
<div class="anime-card relative group cursor-pointer"
onclick="openPlayer('${item.frame}')">

<img src="${item.img}" 
class="rounded-2xl transition duration-500 group-hover:scale-110">

<div class="absolute bottom-0 left-0 w-full p-3 
bg-gradient-to-t from-black via-black/60 to-transparent rounded-b-2xl">
<h4 class="text-sm font-semibold truncate">${item.title}</h4>
</div>

</div>
`;
});
});

function openPlayer(url){
playerContainer.innerHTML=`<iframe src="${url}" allowfullscreen></iframe>`;
toggleModal('playerModal');
}
function closePlayer(){
playerContainer.innerHTML="";
toggleModal('playerModal');
}
function toggleModal(id){
document.getElementById(id).classList.toggle("active");
}

searchInput.addEventListener("input", e=>{
const value=e.target.value.toLowerCase();
document.querySelectorAll(".anime-card").forEach(card=>{
card.style.display=
card.innerText.toLowerCase().includes(value)
? "block"
: "none";
});
});
</script>

</body>
</html>
