<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeZen Portal | Level Up</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase SDK (compat версии) - СТРОГО В ЭТОМ ПОРЯДКЕ -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at 20% 30%, #1a0033, #0a0a0f 70%);
            color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh;
        }
        body::before {
            content: ""; position: fixed; top: -40%; left: -40%; width: 180%; height: 180%;
            background: radial-gradient(circle, #7c3aed15 0%, transparent 60%);
            animation: rotate 30s linear infinite; z-index: -1;
        }
        @keyframes rotate { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }

        .glass { background: rgba(20, 20, 30, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        .anime-card { transition: .4s cubic-bezier(.2, .8, .2, 1); cursor: pointer; }
        .anime-card:hover { transform: translateY(-10px) scale(1.02); }
        .anime-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: .3s; z-index: 100; }
        .modal.active { opacity: 1; pointer-events: auto; }
        
        .fade-box { transform: translateY(30px); opacity: 0; transition: .4s; }
        .modal.active .fade-box { transform: translateY(0); opacity: 1; }

        input, textarea { background: #1e1e2a; border: 1px solid rgba(255,255,255,0.05); outline: none; transition: .3s; color: white; }
        input:focus { border-color: #7c3aed; }

        .episode-btn.active { background: #7c3aed; box-shadow: 0 0 15px rgba(124,58,237,0.5); }
        .star-active { color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.4); }

        #xpBar { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body>

<header class="glass fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center">
    <div class="text-2xl font-black tracking-tighter" onclick="location.reload()" style="cursor:pointer">
        <span class="text-purple-500">ANIME</span>ZEN
    </div>
    <div class="flex items-center gap-4">
        <input id="searchInput" type="text" placeholder="Поиск..." class="hidden md:block px-4 py-2 rounded-full text-sm w-48">
        <button id="adminBtn" onclick="toggleModal('adminModal')" class="hidden bg-white/10 px-4 py-2 rounded-xl text-sm">Админ</button>
        <button id="authBtn" onclick="toggleModal('authModal')" class="bg-purple-600 px-6 py-2 rounded-xl text-sm font-bold">Войти</button>
        <button id="profileBtn" onclick="toggleModal('profileModal')" class="hidden bg-blue-600 px-6 py-2 rounded-xl text-sm font-bold">Профиль</button>
        <button id="logoutBtn" onclick="logout()" class="hidden text-gray-500 text-xs hover:text-red-500 transition">Выйти</button>
    </div>
</header>

<section class="pt-40 pb-12 text-center">
    <h1 class="text-5xl md:text-7xl font-black bg-gradient-to-r from-white via-purple-400 to-purple-800 bg-clip-text text-transparent italic">ANIMEZEN</h1>
    <p class="mt-4 text-gray-500 tracking-[0.4em] uppercase text-[10px]">Cloud Anime Library & Social XP</p>
</section>

<section class="max-w-7xl mx-auto px-6 pb-20">
    <div id="animeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
</section>

<!-- AUTH MODAL -->
<div id="authModal" class="modal">
    <div class="fade-box bg-[#141420] p-8 rounded-[2.5rem] w-80 border border-white/5 shadow-2xl text-center">
        <h2 class="text-xl mb-6 font-black text-purple-400 uppercase tracking-widest">Вход</h2>
        <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-3 rounded-2xl">
        <input id="password" type="password" placeholder="Пароль" class="w-full p-4 mb-6 rounded-2xl">
        <button onclick="login()" class="w-full bg-purple-600 py-4 rounded-2xl font-bold mb-4">Войти</button>
        <div class="h-[1px] bg-white/5 mb-4"></div>
        <input id="regEmail" type="email" placeholder="Новый Email" class="w-full p-4 mb-3 rounded-2xl">
        <input id="regPassword" type="password" placeholder="Пароль" class="w-full p-4 mb-4 rounded-2xl">
        <button onclick="register()" class="w-full border border-purple-600 text-purple-400 py-3 rounded-2xl font-bold hover:bg-purple-600 hover:text-white transition">Регистрация</button>
    </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal">
    <div class="fade-box bg-[#141420] p-8 rounded-[2.5rem] w-[360px] border border-blue-500/20 shadow-2xl">
        <div class="relative w-28 h-28 mx-auto mb-6">
            <img id="profileAvatar" src="https://via.placeholder.com" class="w-full h-full rounded-full object-cover border-4 border-blue-600 p-1">
            <label for="avatarFile" class="absolute bottom-0 right-0 bg-blue-600 p-2 rounded-full cursor-pointer shadow-lg hover:scale-110 transition">
                <svg xmlns="http://www.w3.org" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </label>
            <input type="file" id="avatarFile" class="hidden" accept="image/*">
        </div>
        
        <input id="nickname" placeholder="Твой ник" class="w-full bg-black/30 border-none p-3 mb-6 rounded-2xl text-center text-xl font-black">
        
        <div class="bg-[#1e1e2a] p-5 rounded-[2rem] mb-6 border border-white/5">
            <div class="flex justify-between items-end mb-2">
                <div class="text-[10px] text-gray-500 uppercase tracking-tighter">LVL <span id="levelDisplay" class="text-blue-400 text-lg ml-1">1</span></div>
                <div class="text-[10px] text-gray-500"><span id="xpDisplay" class="text-white">0</span> XP</div>
            </div>
            <div class="w-full h-1.5 bg-black/40 rounded-full overflow-hidden">
                <div id="xpBar" class="h-full bg-gradient-to-r from-blue-600 to-purple-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="achievementsList" class="flex flex-wrap gap-2 mb-6 min-h-[30px]"></div>

        <button onclick="saveProfile()" id="saveBtn" class="w-full bg-blue-600 py-4 rounded-2xl font-bold uppercase tracking-widest text-sm transition hover:shadow-[0_0_20px_rgba(37,99,235,0.4)]">Сохранить данные</button>
    </div>
</div>

<!-- PLAYER MODAL -->
<div id="playerModal" class="modal">
    <div class="fade-box w-[95%] max-w-4xl bg-[#141420] rounded-[2.5rem] p-6 relative overflow-hidden border border-white/5 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <h2 id="playerTitle" class="text-lg font-black text-purple-400 truncate pr-8 uppercase">Название</h2>
            <button onclick="closePlayer()" class="text-gray-600 hover:text-white transition text-3xl">&times;</button>
        </div>
        
        <div class="aspect-video bg-black rounded-3xl overflow-hidden mb-6 shadow-2xl">
            <iframe id="playerFrame" class="w-full h-full" allowfullscreen></iframe>
        </div>

        <div id="episodesList" class="flex gap-2 flex-wrap mb-6 scrollbar-hide overflow-x-auto pb-2"></div>

        <div class="flex items-center gap-6 border-y border-white/5 py-4 mb-6">
            <button onclick="toggleLike()" class="flex items-center gap-2 bg-red-500/10 hover:bg-red-500 px-4 py-2 rounded-xl transition text-red-500 hover:text-white">
                ❤ <span id="likesCount">0</span>
            </button>
            <div id="ratingContainer" class="flex gap-1"></div>
        </div>

        <div class="space-y-4">
            <div id="commentsList" class="space-y-3 max-h-40 overflow-y-auto pr-2"></div>
            <div id="commentForm" class="hidden flex gap-2">
                <input id="commentText" class="flex-1 p-3 rounded-xl text-sm" placeholder="Напиши комментарий...">
                <button onclick="addComment()" class="bg-purple-600 px-6 rounded-xl font-bold hover:bg-purple-500 transition">➤</button>
            </div>
            <p id="loginNotice" class="text-gray-500 text-center text-[10px] py-2 uppercase tracking-widest">Войдите, чтобы общаться</p>
        </div>
    </div>
</div>

<!-- ADMIN MODAL -->
<div id="adminModal" class="modal">
    <div class="fade-box bg-[#141420] p-8 rounded-[2rem] w-[400px]">
        <h2 class="text-xl mb-6 font-black text-purple-400">ADD ANIME</h2>
        <input id="aTitle" placeholder="Title" class="w-full p-4 mb-3 rounded-2xl">
        <input id="aImg" placeholder="Poster URL" class="w-full p-4 mb-3 rounded-2xl">
        <div id="episodesContainer" class="space-y-2 mb-4 max-h-40 overflow-y-auto"></div>
        <button onclick="addEpisodeField()" class="w-full bg-white/5 py-3 rounded-2xl mb-4 text-xs">+ Episode Link</button>
        <button onclick="saveAnime()" class="w-full bg-purple-600 py-4 rounded-2xl font-bold">PUBLISH</button>
    </div>
</div>

<script>
// --- CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyAAigsanR80Qe2Du4MmAxIMLBghPqy4nXE",
  authDomain: "animezen-97635.firebaseapp.com",
  databaseURL: "https://animezen-97635-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "animezen-97635",
  storageBucket: "animezen-97635.firebasestorage.app",
  messagingSenderId: "213401429170",
  appId: "1:213401429170:web:a73c7cd2790586d92315ab"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();
const ADMIN = "rdzaurov093@gmail.com";
const XP_STEP = 100;

let currentAnimeKey = null;
let currentUserId = null;

// --- AUTH ---
auth.onAuthStateChanged(user => {
    if(user) {
        currentUserId = user.uid;
        authBtn.classList.add("hidden");
        logoutBtn.classList.remove("hidden");
        profileBtn.classList.remove("hidden");
        if(user.email === ADMIN) adminBtn.classList.remove("hidden");
        loadUserProfile();
    } else {
        currentUserId = null;
        authBtn.classList.remove("hidden");
        logoutBtn.classList.add("hidden");
        profileBtn.classList.add("hidden");
        adminBtn.classList.add("hidden");
    }
    loadAnimeGrid();
});

function login() { auth.signInWithEmailAndPassword(email.value, password.value).then(() => toggleModal('authModal')).catch(e => alert(e.message)); }
function register() { auth.createUserWithEmailAndPassword(regEmail.value, regPassword.value).then(() => toggleModal('authModal')).catch(e => alert(e.message)); }
function logout() { auth.signOut().then(() => location.reload()); }

function toggleModal(id) { 
    const m = document.getElementById(id);
    m.classList.toggle("active");
    m.onclick = (e) => { if(e.target === m) m.classList.remove("active"); }
}

// --- XP SYSTEM ---
async function addXP(amount) {
    if (!currentUserId) return;
    const userRef = db.ref(`users/${currentUserId}`);
    const snap = await userRef.once('value');
    const u = snap.val() || { xp: 0, level: 1, achievements: [] };
    
    let newXP = (u.xp || 0) + amount;
    let newLevel = Math.floor(newXP / XP_STEP) + 1;
    let newAchievements = u.achievements || [];
    
    if (newLevel > (u.level || 1) && !newAchievements.includes("Первый шаг")) {
        newAchievements.push("Восходящая звезда ✨");
    }

    await userRef.update({ xp: newXP, level: newLevel, achievements: newAchievements });
}

// --- ANIME LOGIC ---
function addEpisodeField() {
    const div = document.createElement('div');
    div.className = "flex gap-2";
    div.innerHTML = `<input placeholder="Name" class="w-1/3 p-3 rounded-xl text-xs ep-title"><input placeholder="Embed URL" class="w-2/3 p-3 rounded-xl text-xs ep-frame">`;
    episodesContainer.appendChild(div);
}

function saveAnime() {
    const episodes = Array.from(episodesContainer.children).map(child => ({
        title: child.querySelector('.ep-title').value,
        frame: child.querySelector('.ep-frame').value
    })).filter(e => e.frame);

    db.ref("animeList").push({ title: aTitle.value, img: aImg.value, episodes: episodes });
    location.reload();
}

function loadAnimeGrid() {
    db.ref("animeList").on("value", snap => {
        animeGrid.innerHTML = "";
        const data = snap.val();
        if(!data) return;
        Object.entries(data).reverse().forEach(([key, item]) => {
            animeGrid.innerHTML += `
                <div class="anime-card" onclick="openPlayer('${key}')">
                    <img src="${item.img}">
                    <div class="mt-3 px-1">
                        <div class="text-xs font-bold truncate tracking-tight">${item.title}</div>
                        <div class="text-[9px] text-gray-500 mt-1 uppercase">Cloud Stream</div>
                    </div>
                </div>`;
        });
    });
}

function openPlayer(key) {
    currentAnimeKey = key;
    db.ref(`animeList/${key}`).once('value', snap => {
        const anime = snap.val();
        playerTitle.innerText = anime.title;
        episodesList.innerHTML = "";
        if(anime.episodes) {
            anime.episodes.forEach((ep, i) => {
                const btn = document.createElement('button');
                btn.className = "episode-btn bg-white/5 border border-white/5 px-4 py-2 rounded-xl text-xs transition min-w-[90px]";
                btn.innerText = ep.title || `EP ${i+1}`;
                btn.onclick = () => {
                    playerFrame.src = ep.frame;
                    document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
                episodesList.appendChild(btn);
                if(i === 0) btn.click();
            });
        }
        loadLikesAndRating();
        loadComments();
        if(auth.currentUser) { commentForm.classList.remove("hidden"); loginNotice.classList.add("hidden"); }
        else { commentForm.classList.add("hidden"); loginNotice.classList.remove("hidden"); }
        toggleModal('playerModal');
    });
}

function closePlayer() { playerFrame.src = ""; toggleModal('playerModal'); }

// --- LIKES & RATING ---
function toggleLike() {
    if(!currentUserId) return alert("Войдите!");
    const ref = db.ref(`animeList/${currentAnimeKey}/likes/${currentUserId}`);
    ref.once('value', snap => {
        if(snap.exists()) { ref.remove(); }
        else { ref.set(true); addXP(10); }
    });
}

function loadLikesAndRating() {
    db.ref(`animeList/${currentAnimeKey}`).on('value', snap => {
        const data = snap.val();
        if(!data) return;
        likesCount.innerText = data.likes ? Object.keys(data.likes).length : 0;
        const ratings = data.rating ? Object.values(data.rating) : [];
        const avg = ratings.length ? (ratings.reduce((a,b)=>a+b)/ratings.length).toFixed(1) : "0.0";
        ratingContainer.innerHTML = `<span class="text-yellow-400 font-bold mr-2 text-sm">${avg}</span>`;
        for(let i=1; i<=5; i++) {
            const star = document.createElement('span');
            star.innerHTML = '★';
            star.className = `cursor-pointer text-xl transition ${i <= (data.rating?.[currentUserId] || 0) ? 'star-active' : 'text-gray-700'}`;
            star.onclick = () => { if(currentUserId) db.ref(`animeList/${currentAnimeKey}/rating/${currentUserId}`).set(i); };
            ratingContainer.appendChild(star);
        }
    });
}

// --- COMMENTS ---
function addComment() {
    if(!commentText.value.trim()) return;
    db.ref(`users/${currentUserId}`).once('value', snap => {
        const u = snap.val() || {};
        db.ref("comments/"+currentAnimeKey).push({
            user: u.nickname || auth.currentUser.email,
            avatar: u.avatar || 'https://via.placeholder.com',
            text: commentText.value,
            uid: currentUserId
        });
        commentText.value = "";
        addXP(20);
    });
}

function loadComments() {
    db.ref("comments/"+currentAnimeKey).on("value", snap => {
        commentsList.innerHTML = "";
        const data = snap.val();
        if(!data) return;
        Object.entries(data).forEach(([cid, c]) => {
            const isOwner = c.uid === currentUserId || auth.currentUser?.email === ADMIN;
            commentsList.innerHTML += `
                <div class="bg-white/5 p-3 rounded-2xl flex gap-3 items-center group border border-white/5">
                    <img src="${c.avatar}" class="w-8 h-8 rounded-full object-cover border border-purple-500/50">
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-0.5">
                            <span class="text-[9px] text-purple-400 font-bold uppercase">${c.user}</span>
                            ${isOwner ? `<button onclick="deleteComment('${cid}')" class="text-[9px] text-red-500 opacity-0 group-hover:opacity-100 transition">DEL</button>` : ''}
                        </div>
                        <div class="text-xs text-gray-300">${c.text}</div>
                    </div>
                </div>`;
        });
    });
}

function deleteComment(cid) { db.ref(`comments/${currentAnimeKey}/${cid}`).remove(); }

// --- PROFILE ---
avatarFile.onchange = e => {
    const [file] = avatarFile.files;
    if (file) profileAvatar.src = URL.createObjectURL(file);
};

async function saveProfile() {
    saveBtn.innerText = "UPDATING...";
    const file = avatarFile.files[0];
    let url = profileAvatar.src;

    if (file) {
        const ref = storage.ref(`avatars/${currentUserId}`);
        await ref.put(file);
        url = await ref.getDownloadURL();
    }

    await db.ref(`users/${currentUserId}`).update({ nickname: nickname.value, avatar: url });
    saveBtn.innerText = "SUCCESS ✨";
    setTimeout(() => { saveBtn.innerText = "Сохранить данные"; toggleModal('profileModal'); }, 1000);
}

function loadUserProfile() {
    if(!currentUserId) return;
    db.ref(`users/${currentUserId}`).on('value', snap => {
        const u = snap.val();
        if(u) {
            profileAvatar.src = u.avatar || 'https://via.placeholder.com';
            nickname.value = u.nickname || '';
            const xp = u.xp || 0;
            const progress = (xp % XP_STEP / XP_STEP) * 100;
            levelDisplay.innerText = u.level || 1;
            xpDisplay.innerText = xp;
            xpBar.style.width = progress + '%';
            achievementsList.innerHTML = (u.achievements || []).map(a => `<span class="text-[9px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20">${a}</span>`).join('');
            if(u.nickname) authBtn.innerText = u.nickname;
        }
    });
}

// Search
searchInput.addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    document.querySelectorAll(".anime-card").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
    });
});
</script>
</body>
</html>
