<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeZen</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body{
background: radial-gradient(circle at 20% 30%, #1a0033, #0a0a0f 70%);
color:#fff;
font-family:Inter,sans-serif;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:-40%;
left:-40%;
width:180%;
height:180%;
background:radial-gradient(circle,#7c3aed33 0%,transparent 60%);
animation:rotate 25s linear infinite;
z-index:-1;
}
@keyframes rotate{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.glass{
background:rgba(20,20,30,.6);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.05);
}

.anime-card{
transition:.4s cubic-bezier(.2,.8,.2,1);
}
.anime-card:hover{
transform:scale(1.07);
box-shadow:0 20px 40px rgba(124,58,237,.4);
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
backdrop-filter:blur(20px);
align-items:center;
justify-content:center;
}
.modal.active{
display:flex;
animation:fade .3s ease;
}
@keyframes fade{
from{opacity:0}
to{opacity:1}
}

input, textarea{
background:#1e1e2a;
outline:none;
}

button{
transition:.3s;
}
button:hover{
transform:scale(1.05);
}
</style>
</head>
<body>

<header class="glass fixed top-0 w-full z-50 px-8 py-4 flex justify-between items-center">
<div class="text-2xl font-black tracking-wider">
<span class="text-purple-400">ANIME</span>ZEN
</div>

<div class="flex items-center gap-4">
<input id="searchInput" type="text" placeholder="Поиск..." class="px-4 py-2 rounded-xl text-sm">

<button id="adminBtn" onclick="toggleModal('adminModal')" class="hidden bg-purple-600 px-4 py-2 rounded-xl text-sm">
Админ
</button>

<button id="authBtn" onclick="toggleModal('authModal')" class="bg-purple-600 px-4 py-2 rounded-xl text-sm">
Войти
</button>

<button id="logoutBtn" onclick="logout()" class="hidden bg-red-600 px-4 py-2 rounded-xl text-sm">
Выйти
</button>
</div>
</header>

<section class="pt-40 pb-24 text-center">
<h1 class="text-6xl font-black bg-gradient-to-r from-white to-purple-500 bg-clip-text text-transparent">
ANIMEZEN
</h1>
<p class="mt-6 text-gray-400">
Твоя личная аниме-библиотека в облаке
</p>
</section>

<section class="max-w-7xl mx-auto px-8 pb-20">
<div id="animeGrid" class="grid grid-cols-2 md:grid-cols-5 gap-8"></div>
</section>

<!-- AUTH -->
<div id="authModal" class="modal">
<div class="bg-[#141420] p-10 rounded-3xl w-96">

<h2 class="text-xl mb-6 text-purple-400 font-bold">Авторизация</h2>

<input id="email" type="email" placeholder="Email" class="w-full p-3 mb-4 rounded-xl">
<input id="password" type="password" placeholder="Пароль" class="w-full p-3 mb-6 rounded-xl">

<button onclick="login()" class="w-full bg-purple-600 py-3 rounded-xl font-bold">
Войти
</button>

<hr class="my-6 border-gray-700">

<input id="regEmail" type="email" placeholder="Email" class="w-full p-3 mb-4 rounded-xl">
<input id="regPassword" type="password" placeholder="Пароль" class="w-full p-3 mb-6 rounded-xl">

<button onclick="register()" class="w-full bg-purple-600 py-3 rounded-xl font-bold">
Регистрация
</button>

</div>
</div>

<!-- ADMIN -->
<div id="adminModal" class="modal">
<div class="bg-[#141420] p-10 rounded-3xl w-96">

<h2 class="text-xl mb-6 text-purple-400 font-bold">Добавить аниме</h2>

<input id="aTitle" placeholder="Название" class="w-full p-3 mb-3 rounded-xl">
<input id="aImg" placeholder="URL постера" class="w-full p-3 mb-3 rounded-xl">
<input id="aFrame" placeholder="Rutube embed ссылка" class="w-full p-3 mb-6 rounded-xl">

<button onclick="addAnime()" class="w-full bg-purple-600 py-3 rounded-xl font-bold">
Добавить
</button>

</div>
</div>

<!-- PLAYER -->
<div id="playerModal" class="modal">
<div class="w-[80%] bg-[#141420] rounded-3xl overflow-hidden p-6">

<div class="flex justify-between items-center mb-4">
<h2 id="playerTitle" class="text-lg font-bold text-purple-400"></h2>

<button onclick="closePlayer()" class="bg-red-600 px-4 py-2 rounded-xl text-sm">
Назад
</button>
</div>

<div class="aspect-video bg-black rounded-2xl overflow-hidden mb-6">
<iframe id="playerFrame" class="w-full h-full"></iframe>
</div>

<h3 class="text-purple-400 mb-3 font-bold">Комментарии</h3>

<div id="commentsList" class="space-y-3 max-h-40 overflow-y-auto mb-4"></div>

<div id="commentForm" class="hidden">
<textarea id="commentText" class="w-full p-3 rounded-xl mb-3" placeholder="Написать комментарий..."></textarea>
<button onclick="addComment()" class="bg-purple-600 px-4 py-2 rounded-xl">
Отправить
</button>
</div>

<p id="loginNotice" class="text-gray-400 text-sm hidden">
Войдите, чтобы оставить комментарий
</p>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAAigsanR80Qe2Du4MmAxIMLBghPqy4nXE",
  authDomain: "animezen-97635.firebaseapp.com",
  databaseURL: "https://animezen-97635-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "animezen-97635",
  storageBucket: "animezen-97635.firebasestorage.app",
  messagingSenderId: "213401429170",
  appId: "1:213401429170:web:a73c7cd2790586d92315ab"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();
const ADMIN="rdzaurov093@gmail.com";

let currentAnimeKey=null;

auth.onAuthStateChanged(user=>{
if(user){
authBtn.classList.add("hidden");
logoutBtn.classList.remove("hidden");
if(user.email===ADMIN){
adminBtn.classList.remove("hidden");
}
}else{
authBtn.classList.remove("hidden");
logoutBtn.classList.add("hidden");
adminBtn.classList.add("hidden");
}
});

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>toggleModal('authModal'))
.catch(e=>alert(e.message));
}

function register(){
auth.createUserWithEmailAndPassword(regEmail.value,regPassword.value)
.then(()=>{
alert("Аккаунт создан!");
regEmail.value="";
regPassword.value="";
toggleModal('authModal');
})
.catch(e=>alert(e.message));
}

function logout(){ auth.signOut(); }

function addAnime(){
db.ref("animeList").push({
title:aTitle.value,
img:aImg.value,
frame:aFrame.value
});
toggleModal('adminModal');
}

db.ref("animeList").on("value",snap=>{
animeGrid.innerHTML="";
const data=snap.val();
if(!data) return;

Object.entries(data).reverse().forEach(([key,item])=>{
animeGrid.innerHTML+=`
<div class="anime-card cursor-pointer relative"
onclick="openPlayer('${item.frame}','${key}','${item.title}')">
<img src="${item.img}" class="rounded-2xl">
<div class="absolute bottom-0 p-3 bg-gradient-to-t from-black to-transparent w-full rounded-b-2xl">
${item.title}
</div>
</div>`;
});
});

function openPlayer(url,key,title){
currentAnimeKey=key;
playerFrame.src=url;
playerTitle.innerText=title;
loadComments();

if(auth.currentUser){
commentForm.classList.remove("hidden");
loginNotice.classList.add("hidden");
}else{
commentForm.classList.add("hidden");
loginNotice.classList.remove("hidden");
}

toggleModal('playerModal');
}

function closePlayer(){
playerFrame.src="";
toggleModal('playerModal');
}

function addComment(){
if(!commentText.value.trim()) return;

db.ref("comments/"+currentAnimeKey).push({
user:auth.currentUser.email,
text:commentText.value,
date:Date.now()
});

commentText.value="";
}

function loadComments(){
commentsList.innerHTML="";

db.ref("comments/"+currentAnimeKey).on("value",snap=>{
commentsList.innerHTML="";
const data=snap.val();
if(!data) return;

Object.values(data).forEach(c=>{
commentsList.innerHTML+=`
<div class="bg-[#1e1e2a] p-3 rounded-xl">
<div class="text-xs text-purple-400">${c.user}</div>
<div>${c.text}</div>
</div>`;
});
});
}

function toggleModal(id){
document.getElementById(id).classList.toggle("active");
}

searchInput.addEventListener("input", e=>{
const val=e.target.value.toLowerCase();
document.querySelectorAll(".anime-card").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(val)?"block":"none";
});
});
</script>

</body>
</html>
