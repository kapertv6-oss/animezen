<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeZen — Твой мир аниме</title>

    <!-- ИСПОЛЬЗУЕМ ТОЛЬКО ПРЯМЫЕ ССЫЛКИ V8 (БЕЗ ОШИБОК) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Исправленный шрифт (теперь без блокировок) -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        :root { --accent: #9333ea; --bg: #09090b; --card-bg: #111118; }
        body {
            background: var(--bg); color: #f4f4f5; font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #2e1065, transparent 50%);
            min-height: 100vh; margin: 0;
        }
        .glass { background: rgba(9, 9, 11, 0.8); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .anime-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 1.5rem; overflow: hidden;
        }
        .anime-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 40px -15px rgba(147, 51, 234, 0.4); }
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); align-items: center; justify-content: center; z-index: 1000; padding: 1.5rem;
        }
        .modal.active { display: flex; }
        .btn-main { background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); font-weight: 700; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.03); box-shadow: 0 0 25px rgba(147, 51, 234, 0.5); }
        .toast { background: #1c1c24; border: 1px solid #3f3f46; padding: 1rem 1.5rem; border-radius: 1rem; color: white; z-index: 9999; }
    </style>
</head>
<body>

<div id="toastContainer" class="fixed top-6 right-6 flex flex-col gap-3 z-50"></div>

<header class="glass fixed top-0 w-full px-6 py-4 flex justify-between items-center z-50">
    <div class="flex items-center gap-8">
        <div class="text-2xl font-black tracking-tighter cursor-pointer" onclick="location.reload()">ANIME<span class="text-purple-500">ZEN</span></div>
        <div class="hidden md:flex bg-white/5 border border-white/10 rounded-full px-4 py-1 items-center gap-2 w-64 focus-within:border-purple-500 transition">
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round" /></svg>
            <input id="searchInput" class="bg-transparent border-none text-sm w-full focus:outline-none py-1" placeholder="Поиск аниме...">
        </div>
    </div>
    <div class="flex gap-6 items-center font-bold text-sm">
        <button onclick="openNews()" class="text-gray-400 hover:text-white transition">Новости</button>
        <button onclick="openProfile()" class="text-gray-400 hover:text-white transition">Профиль</button>
        <button onclick="toggleModal('adminModal')" id="adminBtn" class="hidden bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition">Админ</button>
        <button onclick="login()" id="authBtn" class="btn-main px-6 py-2 rounded-full text-white">Войти</button>
        <button onclick="logout()" id="logoutBtn" class="hidden text-red-500 hover:text-red-400">Выйти</button>
    </div>
</header>

<main class="pt-28 max-w-7xl mx-auto px-6 pb-20">
    <section id="animeSection">
        <h2 class="text-3xl font-black mb-8 uppercase tracking-tight">Популярное</h2>
        <div id="animeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8 text-center"></div>
    </section>

    <section id="newsSection" class="hidden">
        <h2 class="text-3xl font-black mb-8 text-purple-500 uppercase">Новости</h2>
        <div id="newsContainer" class="text-gray-500">Раздел в разработке...</div>
    </section>
</main>

<!-- PLAYER MODAL -->
<div id="playerModal" class="modal" onclick="if(event.target===this) closePlayer()">
    <div class="bg-[#0b0b10] border border-white/10 p-2 rounded-[2.5rem] w-full max-w-5xl shadow-2xl overflow-hidden">
        <div class="aspect-video bg-black rounded-[1.8rem] overflow-hidden">
            <iframe id="playerFrame" class="w-full h-full" allowfullscreen></iframe>
        </div>
        <div class="p-8">
            <div class="flex justify-between items-start mb-6">
                <h3 id="playerTitle" class="text-2xl font-black">Название аниме</h3>
                <div class="text-right">
                    <div id="ratingStars" class="flex gap-1 text-2xl mb-1"></div>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-widest">Рейтинг: <span id="avgRating" class="text-purple-400 text-sm">0.0</span></p>
                </div>
            </div>
            <div id="comments" class="max-h-48 overflow-y-auto space-y-3 mb-6 pr-2"></div>
            <div class="flex gap-3">
                <input id="commentInput" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-purple-500" placeholder="Ваш комментарий...">
                <button onclick="addComment()" class="btn-main px-8 rounded-2xl">Отправить</button>
            </div>
        </div>
    </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal" onclick="if(event.target===this) toggleModal('profileModal')">
    <div class="bg-[#0f0f14] border border-white/10 p-8 rounded-[3rem] w-full max-w-md text-center">
        <div class="relative w-32 h-32 mx-auto mb-6">
            <img id="avatarPreview" class="w-full h-full rounded-full object-cover border-4 border-purple-600/30 p-1 shadow-2xl" src="https://placehold.co">
            <label class="absolute bottom-1 right-1 bg-purple-600 p-2 rounded-full cursor-pointer hover:bg-purple-500 shadow-lg transition">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round" /></svg>
                <input type="file" id="avatarInput" class="hidden" onchange="saveProfile()">
            </label>
        </div>
        <input id="nicknameInput" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-4 text-center text-xl font-black focus:outline-none" placeholder="Никнейм">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white/5 p-4 rounded-2xl text-center">
                <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">ID</div>
                <div id="profileId" class="text-lg font-black text-purple-400">-</div>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl text-center">
                <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Просмотры</div>
                <div class="text-lg font-black text-purple-400">0</div>
            </div>
        </div>
        <button onclick="saveProfile()" class="w-full btn-main py-4 rounded-2xl shadow-xl">Сохранить</button>
    </div>
</div>

<!-- ADMIN MODAL -->
<div id="adminModal" class="modal" onclick="if(event.target===this) toggleModal('adminModal')">
    <div class="bg-[#0f0f14] border border-white/10 p-10 rounded-[3rem] w-full max-w-lg shadow-2xl">
        <h2 class="text-2xl font-black mb-8 text-purple-400 uppercase tracking-tighter">Добавить аниме</h2>
        <div class="space-y-4">
            <input id="admTitle" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none" placeholder="Название">
            <input id="admPoster" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none" placeholder="URL постера">
            <input id="admEmbed" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none" placeholder="src плеера (iframe)">
            <button onclick="addAnime()" class="w-full btn-main py-5 rounded-2xl shadow-lg mt-4">Опубликовать</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAAigsanR80Qe2Du4MmAxIMLBghPqy4nXE",
        databaseURL: "https://animezen-97635-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "animezen-97635",
        storageBucket: "animezen-97635.appspot.com"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database(), storage = firebase.storage();
    const ADMIN_EMAIL = "rdzaurov093@gmail.com";
    let currentUser = null, currentAnimeId = null;

    const toast = (t) => {
        const d = document.createElement("div"); d.className = "toast"; d.innerText = t;
        document.getElementById("toastContainer").appendChild(d);
        setTimeout(() => d.remove(), 3000);
    };

    const toggleModal = (id) => document.getElementById(id).classList.toggle("active");

    // ВХОД ЧЕРЕЗ REDIRECT (более надежно для новых устройств)
    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(async user => {
        currentUser = user;
        if (user) {
            document.getElementById("authBtn").classList.add("hidden");
            document.getElementById("logoutBtn").classList.remove("hidden");
            if (user.email === ADMIN_EMAIL) document.getElementById("adminBtn").classList.remove("hidden");
            
            const s = await db.ref("users/" + user.uid).once("value");
            if (!s.exists()) {
                db.ref("users/" + user.uid).set({ nickname: user.displayName, siteId: Math.floor(Math.random()*9999), avatar: user.photoURL || "" });
            }
        }
    });

    // Обработка результата редиректа при входе
    auth.getRedirectResult().catch(e => {
        if(e.code) toast("Ошибка входа: " + e.message);
    });

    function addAnime() {
        const title = document.getElementById("admTitle").value,
              poster = document.getElementById("admPoster").value,
              embed = document.getElementById("admEmbed").value;
        if(!title || !poster || !embed) return toast("Заполните поля!");
        db.ref("anime").push({ title, poster, embed, rating: 0 });
        toast("Аниме добавлено!");
        toggleModal("adminModal");
    }

    db.ref("anime").on("value", snap => {
        const grid = document.getElementById("animeGrid");
        grid.innerHTML = "";
        snap.forEach(child => {
            const a = child.val(), id = child.key;
            grid.innerHTML += `
                <div class="anime-card group cursor-pointer" data-title="${a.title.toLowerCase()}" onclick="playAnime('${id}', '${a.embed}', '${a.title}')">
                    <div class="relative aspect-[2/3] overflow-hidden">
                        <img src="${a.poster}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <div class="bg-purple-600 p-4 rounded-full"><svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M4.5 2.691l12 7.309-12 7.309V2.691z" /></svg></div>
                        </div>
                        <div class="absolute top-3 left-3 bg-black/70 px-3 py-1 rounded-full text-xs font-bold text-yellow-400 border border-white/10">⭐ ${a.rating || 0}</div>
                    </div>
                    <div class="p-5 font-black text-sm uppercase truncate text-center">${a.title}</div>
                </div>`;
        });
    });

    function playAnime(id, url, title) {
        currentAnimeId = id;
        document.getElementById("playerFrame").src = url;
        document.getElementById("playerTitle").innerText = title;
        toggleModal("playerModal");
        loadComments();
        loadRating();
    }

    function closePlayer() {
        document.getElementById("playerFrame").src = "";
        toggleModal("playerModal");
        db.ref("anime/" + currentAnimeId + "/rates").off();
        db.ref("anime/" + currentAnimeId + "/comments").off();
    }

    document.getElementById("searchInput").oninput = function() {
        const val = this.value.toLowerCase();
        document.querySelectorAll(".anime-card").forEach(c => {
            c.style.display = c.dataset.title.includes(val) ? "block" : "none";
        });
    };

    function loadRating() {
        const stars = document.getElementById("ratingStars");
        stars.innerHTML = "";
        for(let i=1; i<=5; i++) stars.innerHTML += `<span class="cursor-pointer hover:scale-125 transition" onclick="rate(${i})">⭐</span>`;
        db.ref("anime/" + currentAnimeId + "/rating").on("value", s => {
            document.getElementById("avgRating").innerText = s.val() || "0.0";
        });
    }

    function rate(v) {
        if (!currentUser) return toast("Войдите!");
        db.ref("anime/" + currentAnimeId + "/rates/" + currentUser.uid).set(v).then(() => {
            db.ref("anime/" + currentAnimeId + "/rates").once("value", snap => {
                let sum = 0, count = 0;
                snap.forEach(r => { sum += r.val(); count++; });
                let avg = +(sum / count).toFixed(1);
                db.ref("anime/" + currentAnimeId + "/rating").set(avg);
                toast("Оценка сохранена!");
            });
        });
    }

    function loadComments() {
        const cDiv = document.getElementById("comments");
        db.ref("anime/" + currentAnimeId + "/comments").on("value", s => {
            cDiv.innerHTML = "";
            s.forEach(c => {
                cDiv.innerHTML += `<div class="bg-white/5 p-3 rounded-2xl border-l-4 border-purple-600 text-sm">${c.val().text}</div>`;
            });
        });
    }

    function addComment() {
        const inp = document.getElementById("commentInput");
        if (!currentUser || !inp.value.trim()) return toast("Войдите!");
        db.ref("anime/" + currentAnimeId + "/comments").push({ text: inp.value });
        inp.value = "";
    }

    async function openProfile() {
        if (!currentUser) return toast("Войдите!");
        const s = await db.ref("users/" + currentUser.uid).once("value");
        const d = s.val() || {};
        document.getElementById("nicknameInput").value = d.nickname || "";
        document.getElementById("profileId").innerText = d.siteId || "0";
        if (d.avatar) document.getElementById("avatarPreview").src = d.avatar;
        toggleModal("profileModal");
    }

    async function saveProfile() {
        const fileInput = document.getElementById("avatarInput");
        const file = fileInput.files[0];
        let url = document.getElementById("avatarPreview").src;
        if (file) {
            const ref = storage.ref("avatars/" + currentUser.uid);
            await ref.put(file);
            url = await ref.getDownloadURL();
        }
        await db.ref("users/" + currentUser.uid).update({ nickname: document.getElementById("nicknameInput").value, avatar: url });
        document.getElementById("avatarPreview").src = url;
        toast("Данные сохранены!");
    }

    function openNews() {
        document.getElementById("animeSection").classList.toggle("hidden");
        document.getElementById("newsSection").classList.toggle("hidden");
    }
</script>

</body>
</html>
