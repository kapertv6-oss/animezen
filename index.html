<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeZen — Твой путь в мир аниме</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #060606; color: #f0f0f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Фирменные стили и свечение */
        .purple-gradient { background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); }
        .purple-glow { box-shadow: 0 0 25px rgba(168, 85, 247, 0.4); }
        .text-purple { color: #a855f7; }
        
        /* МОДАЛЬНЫЕ ОКНА */
        .modal { display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 1000; position: fixed; inset: 0; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .tab-active { border-bottom: 3px solid #a855f7 !important; color: #a855f7 !important; opacity: 1 !important; }

        /* ТА САМАЯ АНИМАЦИЯ КАРТОЧЕК */
        .anime-card-wrap { 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            will-change: transform;
        }
        .anime-card-wrap:hover { 
            transform: translateY(-15px) scale(1.03); 
            z-index: 10;
        }
        .anime-card-wrap img { transition: transform 0.8s ease; }
        .anime-card-wrap:hover img { transform: scale(1.1); }

        /* Hero и Поиск */
        .hero-bg { background: linear-gradient(to right, #060606 30%, transparent 100%), url('https://images.alphacoders.com'); background-size: cover; background-position: center; }
        .search-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(168,85,247,0.1); backdrop-filter: blur(10px); transition: 0.3s; }
        .search-input:focus { border-color: #a855f7; background: rgba(255,255,255,0.07); box-shadow: 0 0 20px rgba(168, 85, 247, 0.1); }
        
        #playerContainer iframe { width: 100%; height: 100%; border: none; border-radius: 24px; }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header class="border-b border-purple-900/20 py-5 px-6 bg-[#0a0a0a]/80 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter cursor-pointer shrink-0" onclick="location.reload()">
                <span class="text-purple italic font-black">ANIME</span>ZEN
            </div>
            
            <div class="hidden md:flex flex-1 max-w-md mx-10">
                <input type="text" oninput="handleSearch(this.value)" placeholder="Поиск любимого аниме..." class="search-input w-full px-7 py-3 rounded-full text-sm outline-none">
            </div>

            <div class="flex items-center space-x-4">
                <a href="https://t.me/AnimeZenCinema" target="_blank" class="bg-[#24A1DE] hover:scale-105 text-white px-5 py-2.5 rounded-full text-[10px] font-black uppercase transition-all shadow-lg">ТЕЛЕГРАМ</a>
                <a id="adminLink" href="#" onclick="toggleModal('adminPanel')" class="hidden text-purple font-black border border-purple-500/30 px-5 py-2.5 rounded-full text-[10px] uppercase hover:bg-purple-500/10 transition">АДМИНКА</a>
                <button id="authBtn" onclick="toggleModal('authModal')" class="purple-gradient purple-glow hover:scale-110 text-white px-8 py-2.5 rounded-full text-[10px] font-black uppercase transition-all">ВОЙТИ</button>
                <button id="logoutBtn" onclick="handleLogout()" class="hidden text-red-500 font-black text-[10px] uppercase hover:underline transition">ВЫЙТИ</button>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section id="heroSection" class="relative h-[450px] flex items-center">
        <div class="absolute inset-0 hero-bg opacity-40"></div>
        <div class="relative max-w-7xl mx-auto px-6 w-full">
            <div class="max-w-xl">
                <span class="bg-purple-600 text-white text-[10px] px-3 py-1 rounded-md font-bold uppercase tracking-widest">Premium Edition</span>
                <h2 class="text-7xl md:text-8xl font-black mt-4 uppercase italic leading-none tracking-tighter shadow-purple-500/20">ANIME<span class="text-purple">ZEN</span></h2>
                <p class="mt-5 text-gray-400 text-sm md:text-base leading-relaxed max-w-sm">Твоя приватная коллекция аниме с авто-сохранением в GitHub.</p>
            </div>
        </div>
    </section>

    <!-- Сетка -->
    <main class="max-w-7xl mx-auto px-6 py-16 min-h-[600px]">
        <div class="flex items-center space-x-4 mb-12">
            <div class="h-8 w-1.5 purple-gradient rounded-full"></div>
            <h3 id="gridTitle" class="text-3xl font-black uppercase tracking-tighter italic">НЕДАВНИЕ <span class="text-purple">ОБНОВЛЕНИЯ</span></h3>
        </div>
        <div id="animeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-8 text-white">
            <!-- Сюда попадут данные -->
        </div>
    </main>

    <!-- Модалка Входа/Регистрации -->
    <div id="authModal" class="modal p-4">
        <div class="bg-[#0f0f0f] border border-purple-500/20 w-full max-w-md rounded-[3rem] p-10 relative shadow-2xl">
            <button onclick="toggleModal('authModal')" class="absolute top-8 right-8 text-gray-500 text-2xl hover:text-white transition">&times;</button>
            
            <div class="flex space-x-8 mb-10 border-b border-gray-900">
                <button id="tabLogin" onclick="switchAuth('login')" class="pb-3 text-lg font-black tab-active transition-all outline-none">ВХОД</button>
                <button id="tabReg" onclick="switchAuth('reg')" class="pb-3 text-lg font-black text-gray-600 opacity-50 hover:opacity-100 transition-all outline-none">РЕГИСТРАЦИЯ</button>
            </div>

            <form id="formLogin" class="space-y-5" onsubmit="handleLogin(event)">
                <input id="loginUser" type="text" placeholder="Логин" class="w-full bg-[#161616] border border-gray-800 rounded-2xl px-6 py-4 outline-none text-white focus:border-purple-500 transition-all" required>
                <input id="loginPass" type="password" placeholder="Пароль" class="w-full bg-[#161616] border border-gray-800 rounded-2xl px-6 py-4 outline-none text-white focus:border-purple-500 transition-all" required>
                <button type="submit" class="w-full purple-gradient py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:scale-[1.02] transition-all">ВОЙТИ</button>
            </form>

            <form id="formReg" class="hidden space-y-5" onsubmit="event.preventDefault(); alert('Регистрация ограничена')">
                <input type="text" placeholder="Логин" class="w-full bg-[#161616] border border-gray-800 rounded-2xl px-6 py-4 outline-none text-white focus:border-purple-500 transition-all">
                <input type="email" placeholder="Email" class="w-full bg-[#161616] border border-gray-800 rounded-2xl px-6 py-4 outline-none text-white focus:border-purple-500 transition-all">
                <button type="submit" class="w-full bg-gray-800 py-5 rounded-2xl font-black uppercase tracking-widest transition-all">СОЗДАТЬ АККАУНТ</button>
            </form>
        </div>
    </div>

    <!-- Админка -->
    <div id="adminPanel" class="modal p-4">
        <div class="bg-[#0a0a0a] border-2 border-purple-600/30 w-full max-w-xl rounded-[3rem] p-10 relative">
            <button onclick="toggleModal('adminPanel')" class="absolute top-8 right-8 text-gray-500 text-2xl hover:text-white transition">&times;</button>
            <h2 class="text-2xl font-black mb-8 uppercase text-purple italic">Добавить в базу</h2>
            <form class="space-y-4" onsubmit="saveToGitHub(event)">
                <input id="aTitle" type="text" placeholder="Название аниме" class="w-full bg-[#121212] border border-gray-800 rounded-2xl px-6 py-4 outline-none text-white focus:border-purple-500" required>
                <input id="aImg" type="text" placeholder="URL Постера" class="w-full bg-[#121212] border border-gray-800 rounded-2xl px-6 py-4 outline-none text-white focus:border-purple-500" required>
                <input id="aEp" type="text" placeholder="Номер серии" class="w-full bg-[#121212] border border-gray-800 rounded-2xl px-6 py-4 outline-none text-white focus:border-purple-500">
                <textarea id="aFrame" placeholder="Вставь сюда <iframe...> код из Rutube" class="w-full bg-[#121212] border border-gray-800 rounded-2xl px-6 py-4 outline-none text-white h-32 text-xs" required></textarea>
                <button id="saveBtn" class="w-full purple-gradient py-5 rounded-2xl font-black uppercase tracking-widest hover:scale-[1.02] transition">Опубликовать для всех</button>
            </form>
        </div>
    </div>

    <!-- Плеер -->
    <div id="playerModal" class="modal p-4">
        <div class="w-full max-w-6xl aspect-video relative bg-black rounded-[2.5rem] overflow-hidden shadow-2xl border border-purple-500/20">
            <button onclick="closePlayer()" class="absolute top-6 right-6 z-50 bg-black/80 hover:bg-purple-600 w-12 h-12 rounded-full text-white text-3xl transition">&times;</button>
            <div id="playerContainer" class="w-full h-full"></div>
        </div>
    </div>

    <script>
        const GITHUB_CONFIG = {
            token: "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", 
            repo: "kapertv6-oss/animezen", // ЗАМЕНИ ТВОЙ_НИК
            file: "data.json"
        };

        const ADMIN_DATA = { user: "Admin", pass: "kjkszpj006" };
        let isAdmin = localStorage.getItem('isZenAdmin') === 'true';
        let allAnime = [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }

        function switchAuth(type) {
            const isLogin = (type === 'login');
            document.getElementById('formLogin').classList.toggle('hidden', !isLogin);
            document.getElementById('formReg').classList.toggle('hidden', isLogin);
            document.getElementById('tabLogin').className = isLogin ? 'pb-3 text-lg font-black tab-active outline-none' : 'pb-3 text-lg font-black text-gray-600 opacity-50 outline-none';
            document.getElementById('tabReg').className = !isLogin ? 'pb-3 text-lg font-black tab-active outline-none' : 'pb-3 text-lg font-black text-gray-600 opacity-50 outline-none';
        }

        async function loadData() {
            try {
                const res = await fetch(`https://api.github.com{GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.file}?t=${Date.now()}`, {
                    headers: { "Authorization": `token ${GITHUB_CONFIG.token}` }
                });
                const data = await res.json();
                allAnime = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                render();
            } catch (e) { document.getElementById('animeGrid').innerHTML = "База пуста или ошибка загрузки."; }
        }

        function render(filter = "") {
            const grid = document.getElementById('animeGrid');
            const filtered = allAnime.filter(a => a.title.toLowerCase().includes(filter));
            
            grid.innerHTML = filtered.reverse().map((item, idx) => `
                <div class="anime-card-wrap relative">
                    ${isAdmin ? `<button onclick="deleteAnime(${allAnime.length - 1 - idx})" class="absolute -top-3 -right-3 z-30 bg-red-600 text-white rounded-full w-8 h-8 font-black shadow-2xl hover:scale-125 transition">×</button>` : ''}
                    <div class="cursor-pointer" onclick="openPlayer('${encodeURIComponent(item.frame)}')">
                        <div class="relative overflow-hidden rounded-[2.5rem] aspect-[3/4.2] shadow-2xl">
                            <img src="${item.img}" class="object-cover w-full h-full">
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-0 hover:opacity-100 transition-opacity p-6 flex flex-col justify-end">
                                <div class="purple-gradient text-white text-[9px] font-black px-4 py-1.5 rounded-full w-fit italic uppercase">Смотреть</div>
                            </div>
                            <div class="absolute top-5 left-5 bg-black/70 backdrop-blur-xl px-3 py-1 rounded-2xl text-[10px] font-black border border-white/10 italic">EP ${item.ep}</div>
                        </div>
                        <h4 class="mt-5 text-[13px] font-black truncate uppercase tracking-tighter text-center">${item.title}</h4>
                    </div>
                </div>`).join('');
        }

        async function saveToGitHub(e) {
            e.preventDefault();
            document.getElementById('saveBtn').innerText = "СОХРАНЕНИЕ...";
            const newItem = {
                title: document.getElementById('aTitle').value,
                img: document.getElementById('aImg').value,
                ep: document.getElementById('aEp').value,
                frame: document.getElementById('aFrame').value
            };
            allAnime.push(newItem);
            await pushToGitHub("Add " + newItem.title);
            location.reload();
        }

        async function deleteAnime(index) {
            if(!confirm('Удалить тайтл?')) return;
            allAnime.splice(index, 1);
            await pushToGitHub("Delete item");
            location.reload();
        }

        async function pushToGitHub(msg) {
            const getFile = await fetch(`https://api.github.com{GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.file}`, {
                headers: { "Authorization": `token ${GITHUB_CONFIG.token}` }
            });
            const fData = await getFile.json();
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(allAnime, null, 2))));
            await fetch(`https://api.github.com{GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.file}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_CONFIG.token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg, content: content, sha: fData.sha })
            });
        }

        function handleLogin(e) {
            e.preventDefault();
            if(document.getElementById('loginUser').value === ADMIN_DATA.user && document.getElementById('loginPass').value === ADMIN_DATA.pass) {
                localStorage.setItem('isZenAdmin', 'true');
                location.reload();
            } else { alert("Ошибка!"); }
        }

        function handleLogout() { localStorage.setItem('isZenAdmin', 'false'); location.reload(); }
        function handleSearch(q) { render(q.toLowerCase()); }
        
        function openPlayer(enc) {
            let f = decodeURIComponent(enc).replace(/width=".*?"/, 'width="100%"').replace(/height=".*?"/, 'height="100%"');
            document.getElementById('playerContainer').innerHTML = f;
            toggleModal('playerModal');
        }
        function closePlayer() { document.getElementById('playerContainer').innerHTML = ''; toggleModal('playerModal'); }

        if(isAdmin) {
            document.getElementById('adminLink').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('authBtn').classList.add('hidden');
        }
        loadData();
    </script>
</body>
</html>
